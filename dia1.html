<<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Día 1</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(270deg, #ffecd2, #fcb69f, #ffdde1, #f8b500);
  background-size: 600% 600%;
  animation: fondo 12s ease infinite;
  overflow-x: hidden;
}

@keyframes fondo {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* ✨ PARTÍCULAS */
.particulas span {
  position: absolute;
  bottom: -50px;
  width: 15px;
  height: 15px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  animation: subir 10s linear infinite;
}

@keyframes subir {
  0% {transform: translateY(0);}
  100% {transform: translateY(-100vh);}
}

/* 🌟 HEADER */
header {
  text-align: center;
  padding: 80px 20px 40px;
  color: white;
}

header h1 {
  font-size: 55px;
  margin: 0;
  text-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

header p {
  font-size: 18px;
  opacity: 0.9;
}

/* 💌 TARJETA */
.card {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  border-radius: 25px;
  padding: 30px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.25);
  animation: aparecer 1s ease;
}

@keyframes aparecer {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}

/* ✨ BLOQUES */
.bloque {
  margin-bottom: 20px;
  padding: 15px;
  border-radius: 15px;
  color: white;
  font-weight: 500;
}

.obs { background: linear-gradient(135deg, #ff758f, #ff4d6d); }
.ref { background: linear-gradient(135deg, #ffd166, #fca311); }
.apr { background: linear-gradient(135deg, #06d6a0, #1b9aaa); }

/* 🖼 IMAGEN */
.imagen {
  width: 100%;
  border-radius: 15px;
  margin: 20px 0;
  transition: 0.3s;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.imagen:hover {
  transform: scale(1.05);
}

/* 🔙 BOTÓN */
.boton {
  display: block;
  text-align: center;
  margin-top: 20px;
  padding: 12px;
  border-radius: 12px;
  background: linear-gradient(135deg, #ff4d6d, #ff758f);
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.boton:hover {
  transform: scale(1.1);
}
</style>
</head>

<body>

<!-- ✨ EFECTO -->
<div class="particulas">
  <span style="left:10%; animation-duration:8s;"></span>
  <span style="left:30%; animation-duration:12s;"></span>
  <span style="left:50%; animation-duration:10s;"></span>
  <span style="left:70%; animation-duration:7s;"></span>
  <span style="left:90%; animation-duration:9s;"></span>
</div>

<!-- 🌟 HEADER -->
<header>
  <h1>🎨 Día 1</h1>
  <p>Primer acercamiento</p>
</header>

<!-- 💌 CONTENIDO -->
<div class="card">

  <div class="bloque obs">
    👀 Primer contacto con el entorno educativo
  </div>

  <img src="img/dia1-1.jpg" class="imagen">

  <div class="bloque ref">
    💭 Un espacio donde aprender también es sentir
  </div>

  <div class="bloque apr">
    🚀 Cada detalle enseña, incluso lo más simple
  </div>

  <a href="index.html" class="boton">Volver ✨</a>

</div>

</body>
</html>
