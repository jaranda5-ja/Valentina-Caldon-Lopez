<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Día 1</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<!-- GALERIA -->
<div class="galeria">
<img id="img" src="img/dia1-1.jpg">

<button class="btn left" onclick="prev()">❮</button>
<button class="btn right" onclick="next()">❯</button>
</div>

<!-- TEXTO -->
<div class="texto dia1">

<h1>🎨 Día 1</h1>

<div class="box">
<b>Observación:</b>
<p>Primer acercamiento al entorno educativo y reconocimiento del aula.</p>
</div>

<div class="box">
<b>Interacción:</b>
<p>Participación activa con los niños mediante actividades lúdicas.</p>
</div>

<div class="box">
<b>Reflexión:</b>
<p>El juego es la base fundamental del aprendizaje en la infancia.</p>
</div>

</div>
</div>

<script>
let imgs=[
"img/dia1-1.jpg",
"img/dia1-2.jpg",
"img/dia1-3.jpg"
];

let i=0;

function show(){
document.getElementById("img").src=imgs[i];
}

function next(){
i=(i+1)%imgs.length;
show();
}

function prev(){
i=(i-1+imgs.length)%imgs.length;
show();
}
</script>

</body>
</html>
