<body class="dia1-body">

<div class="dia-container">

  <!-- GALERIA -->
  <div class="galeria">
    <button class="btn left" onclick="prev()">❮</button>
    <img id="imgDia" src="img/dia1-1.jpg">
    <button class="btn right" onclick="next()">❯</button>
  </div>

  <!-- CONTENIDO -->
  <div class="contenido">
    <h1 class="titulo-dia">🌞 Día 1</h1>

    <div class="bloque">
      <h3>🔍 Observo</h3>
      <p>Se analizó el entorno del aula y la interacción entre docente y estudiantes.</p>
    </div>

    <div class="bloque">
      <h3>🤝 Participo</h3>
      <p>Se apoyó en actividades básicas fortaleciendo la conexión con los niños.</p>
    </div>

    <div class="bloque">
      <h3>💡 Aprendo</h3>
      <p>Se comprendió la importancia del ambiente en el aprendizaje infantil.</p>
    </div>

  </div>

</div>

<script>
let imagenes = [
  "img/dia1-1.jpg",
  "img/dia1-2.jpg",
  "img/dia1-3.jpg",
  "img/dia1-4.jpg",
  "img/dia1-5.jpg",
  "img/dia1-6.jpg",
  "img/dia1-7.jpg",
  "img/dia1-8.jpg",
  "img/dia1-9.jpg"
];

let index = 0;

function showImage() {
  document.getElementById("imgDia").src = imagenes[index];
}

function next() {
  index = (index + 1) % imagenes.length;
  showImage();
}

function prev() {
  index = (index - 1 + imagenes.length) % imagenes.length;
  showImage();
}
</script>

</body>
