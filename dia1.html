<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Día 1</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(270deg, #ffecd2, #fcb69f, #ffdde1, #f8b500);
  background-size: 600% 600%;
  animation: fondo 12s ease infinite;
}

@keyframes fondo {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

header {
  text-align: center;
  padding: 60px;
  color: white;
}

header h1 {
  font-size: 50px;
}

/* CONTENEDOR */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* CARD */
.card {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(12px);
  border-radius: 25px;
  padding: 25px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
}

/* IMAGEN */
.slider img {
  width: 100%;
  border-radius: 20px;
  transition: 0.5s;
}

/* BOTONES */
.controls {
  margin-top: 10px;
  text-align: center;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* TEXTO */
.texto {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.texto h2 {
  color: #ff4d6d;
}

.texto p {
  color: #333;
  line-height: 1.6;
}

/* BOTÓN VOLVER */
.boton {
  margin-top: 20px;
  padding: 10px;
  text-align: center;
  background: linear-gradient(135deg, #ff4d6d, #ff758f);
  color: white;
  border-radius: 12px;
  text-decoration: none;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .card {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<header>
  <h1>🎨 Día 1</h1>
</header>

<div class="container">
  <div class="card">

    <!-- 🖼 SLIDER -->
    <div class="slider">
      <img id="imagen" src="img/dia1-1.jpg">

      <div class="controls">
        <button onclick="prev()">⬅</button>
        <button onclick="next()">➡</button>
      </div>
    </div>

    <!-- 🧠 TEXTO -->
    <div class="texto">
      <h2 id="titulo">Observación</h2>
      <p id="descripcion">
        Primer acercamiento al entorno educativo.
      </p>

      <a href="index.html" class="boton">⬅ Volver</a>
    </div>

  </div>
</div>

<script>
let index = 0;

const data = [
  {
    img: "img/dia1-1.jpg",
    titulo: "👀 Observación",
    texto: "Primer acercamiento al entorno educativo y dinámica del aula."
  },
  {
    img: "img/dia1-2.jpg",
    titulo: "📚 Contexto",
    texto: "Se identifican espacios de aprendizaje y comportamiento de los niños."
  },
  {
    img: "img/dia1-3.jpg",
    titulo: "🤝 Interacción",
    texto: "Relación entre docente y estudiantes en actividades diarias."
  },
  {
    img: "img/dia1-4.jpg",
    titulo: "🎯 Enfoque",
    texto: "Actividades centradas en participación y exploración."
  },
  {
    img: "img/dia1-5.jpg",
    titulo: "💡 Reflexión",
    texto: "El aprendizaje también depende del ambiente emocional."
  },
  {
    img: "img/dia1-6.jpg",
    titulo: "🌱 Proceso",
    texto: "Cada niño aprende de forma distinta dentro del aula."
  },
  {
    img: "img/dia1-7.jpg",
    titulo: "🧠 Observación",
    texto: "Importancia de analizar antes de intervenir."
  },
  {
    img: "img/dia1-8.jpg",
    titulo: "🚀 Aprendizaje",
    texto: "Se fortalece la comprensión del rol docente."
  },
  {
    img: "img/dia1-9.jpg",
    titulo: "✨ Conclusión",
    texto: "Un inicio que marca la base del proceso pedagógico."
  }
];

function mostrar() {
  document.getElementById("imagen").src = data[index].img;
  document.getElementById("titulo").innerHTML = data[index].titulo;
  document.getElementById("descripcion").innerHTML = data[index].texto;
}

function next() {
  index = (index + 1) % data.length;
  mostrar();
}

function prev() {
  index = (index - 1 + data.length) % data.length;
  mostrar();
}
</script>

</body>
</html>
