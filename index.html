<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Diario de Campo</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body{
margin:0;
font-family:'Poppins',sans-serif;
background: linear-gradient(135deg,#ff4d6d,#7209b7,#3a86ff,#00c9a7);
background-size:400% 400%;
animation:fondo 12s ease infinite;
color:white;
}

@keyframes fondo{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* ===== TITULO KIDS ===== */
.titulo-kids{
font-family:'Fredoka';
font-size:60px;
text-align:center;
margin-top:80px;
}

.titulo-kids span:nth-child(1){color:#ff6b6b;}
.titulo-kids span:nth-child(2){color:#feca57;}
.titulo-kids span:nth-child(3){color:#48dbfb;}
.titulo-kids span:nth-child(4){color:#1dd1a1;}
.titulo-kids span:nth-child(5){color:#ff9ff3;}
.titulo-kids span:nth-child(6){color:#54a0ff;}

/* ===== SUB ===== */
.sub{
text-align:center;
opacity:.9;
margin-bottom:40px;
}

/* ===== CARDS ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:40px;
max-width:1100px;
margin:auto;
}

.card{
padding:50px 20px;
border-radius:25px;
text-align:center;
text-decoration:none;
color:white;
font-weight:bold;
font-size:22px;
transition:.3s;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

.d1{background:linear-gradient(135deg,#ffd60a,#ffb703);}
.d2{background:linear-gradient(135deg,#2ecc71,#52b788);}
.d3{background:linear-gradient(135deg,#3a86ff,#4cc9f0);}
.d4{background:linear-gradient(135deg,#ff6b6b,#ff8fab);}
.d5{background:linear-gradient(135deg,#ff8500,#ffb703);}

</style>
</head>

<body>

<h1 class="titulo-kids">
<span>D</span><span>i</span><span>a</span><span>r</span><span>i</span><span>o</span>
</h1>

<p class="sub">Diario de Campo - Práctica Infantil</p>

<div class="grid">
<a href="dia1.html" class="card d1">🎨 Día 1</a>
<a href="dia2.html" class="card d2">🌿 Día 2</a>
<a href="dia3.html" class="card d3">🌊 Día 3</a>
<a href="dia4.html" class="card d4">🌸 Día 4</a>
<a href="dia5.html" class="card d5">🔥 Día 5</a>
</div>

</body>
</html>
