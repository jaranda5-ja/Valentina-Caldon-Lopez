<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diario de Campo</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

<!-- ANIMACIONES -->
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

</head>

<body>

<!-- NAV -->
<header class="nav">
  <h2>📘 Diario</h2>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Días</a>
    <a href="#">Reflexión</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero" data-aos="fade-up">

  <div class="nube"></div>
  <div class="sol"></div>

  <h1 class="titulo">
    <span>D</span><span>i</span><span>a</span><span>r</span><span>i</span><span>o</span>
  </h1>

  <h2>de Campo</h2>
  <p>Práctica Pedagógica Infantil</p>

</section>

<!-- ONDA -->
<div class="wave"></div>

<!-- SLIDER -->
<section class="slider" data-aos="zoom-in">
  <img id="slide" src="img/dia1-1.jpg">

  <div class="dots">
    <span onclick="go(0)"></span>
    <span onclick="go(1)"></span>
    <span onclick="go(2)"></span>
  </div>
</section>

<!-- CARDS -->
<section class="cards" data-aos="fade-up">

  <a href="dia1.html" class="card c1">🎨 Día 1</a>
  <a href="dia2.html" class="card c2">🌿 Día 2</a>
  <a href="#" class="card c3">🌊 Día 3</a>
  <a href="#" class="card c4">🌸 Día 4</a>
  <a href="#" class="card c5">⭐ Día 5</a>

</section>

<!-- INFO -->
<section class="info" data-aos="fade-up">
  <h3>Sobre el proyecto</h3>
  <p>Experiencias pedagógicas basadas en observación, interacción y reflexión.</p>
</section>

<!-- SCRIPT SLIDER -->
<script>
let imgs=[
"img/dia1-1.jpg",
"img/dia2-1.jpg",
"img/dia1-2.jpg"
];

let i=0;

function show(){
document.getElementById("slide").src=imgs[i];
updateDots();
}

function go(n){
i=n;
show();
}

function updateDots(){
document.querySelectorAll(".dots span").forEach((d,index)=>{
d.classList.toggle("active", index===i);
});
}

setInterval(()=>{
i=(i+1)%imgs.length;
show();
},4000);

updateDots();
</script>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init({
duration:1000,
once:true
});
</script>

</body>
</html>
