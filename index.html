<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Día 1</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#fff8cc,#ffe066);
}

/* CONTENEDOR */
.container{
max-width:1100px;
margin:60px auto;
background:#fff;
border-radius:25px;
display:flex;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.1);
}

/* GALERIA */
.galeria{
width:55%;
position:relative;
}

.galeria img{
width:100%;
height:100%;
object-fit:cover;
transition:opacity .6s;
}

/* BOTONES */
.btn{
position:absolute;
top:50%;
transform:translateY(-50%);
background:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:50%;
}

.left{left:10px;}
.right{right:10px;}

/* TEXTO */
.texto{
width:45%;
padding:40px;
}

h1{
font-family:Fredoka;
color:#ffb703;
}

.box{
background:#fff8e1;
padding:15px;
border-left:5px solid #ffb703;
margin-bottom:15px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="galeria">
<img id="img" src="img/dia1-1.jpg">
<button class="btn left" onclick="prev()">❮</button>
<button class="btn right" onclick="next()">❯</button>
</div>

<div class="texto">
<h1>🎨 Día 1</h1>

<div class="box">
<b>Observación:</b>
<p>Primer contacto con los niños y el entorno.</p>
</div>

<div class="box">
<b>Interacción:</b>
<p>Participación en actividades lúdicas.</p>
</div>

<div class="box">
<b>Reflexión:</b>
<p>El juego facilita el aprendizaje significativo.</p>
</div>

</div>
</div>

<script>
let imgs=["img/dia1-1.jpg","img/dia1-2.jpg","img/dia1-3.jpg"];
let i=0;

function show(){
document.getElementById("img").src=imgs[i];
}

function next(){
i=(i+1)%imgs.length;
show();
}

function prev(){
i=(i-1+imgs.length)%imgs.length;
show();
}
</script>

</body>
</html>
